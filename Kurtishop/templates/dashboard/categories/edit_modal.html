{% if category %}
<div id="editModal" class="fixed inset-0 bg-black/60 backdrop-blur-sm flex items-center justify-center z-50 p-4">
    <div class="bg-white rounded-3xl w-full max-w-lg shadow-2xl max-h-[90vh] overflow-y-auto">
        <div class="flex justify-between items-center border-b border-gray-100 px-6 py-5 sticky top-0 bg-white rounded-t-3xl">
            <div>
                <h2 class="text-xl font-semibold text-gray-900">Edit Category</h2>
                <p class="text-sm text-gray-500">Update details for "{{ category.name }}"</p>
            </div>
            <a href="{% url 'categories:category_list' %}" class="text-gray-400 hover:text-gray-600 hover:bg-gray-100 rounded-xl p-2 transition">
                <i data-lucide="x" class="w-5 h-5"></i>
            </a>
        </div>

        <form method="post" action="{% url 'categories:category_update' category.pk %}" enctype="multipart/form-data" class="p-6 space-y-5">
            {% csrf_token %}

            <div class="flex justify-center">
                <label for="id_image" class="cursor-pointer group">
                    <div class="w-20 h-20 rounded-2xl bg-gray-50 border-2 border-dashed border-gray-200 group-hover:border-red-300 flex items-center justify-center overflow-hidden transition">
                        {% if category.image %}
                            <img id="editImagePreview" src="{{ category.image.url }}" alt="" class="w-full h-full object-cover">
                            <i id="editImageIcon" data-lucide="image-plus" class="hidden w-6 h-6 text-gray-400"></i>
                        {% else %}
                            <img id="editImagePreview" src="" alt="" class="hidden w-full h-full object-cover">
                            <i id="editImageIcon" data-lucide="image-plus" class="w-6 h-6 text-gray-400 group-hover:text-red-400 transition"></i>
                        {% endif %}
                    </div>
                </label>
                {{ form.image }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Category name</label>
                {{ form.name }}
                {% if form.name.errors %}<p class="text-red-600 text-xs mt-1">{{ form.name.errors.0 }}</p>{% endif %}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Parent category</label>
                {{ form.parent }}
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1.5">Description</label>
                {{ form.description }}
            </div>

            <label class="flex items-center justify-between rounded-2xl border border-gray-200 px-4 py-3 cursor-pointer">
                <div>
                    <span class="text-sm font-medium text-gray-700">Active</span>
                    <p class="text-xs text-gray-400">Visible to customers immediately</p>
                </div>
                {{ form.is_active }}
                <div class="relative w-11 h-6 bg-gray-200 rounded-full peer-checked:bg-emerald-500 transition-colors">
                    <div class="absolute top-0.5 left-0.5 w-5 h-5 bg-white rounded-full shadow transition-transform peer-checked:translate-x-5"></div>
                </div>
            </label>

            <div class="flex gap-3 pt-2">
                <a href="{% url 'categories:category_list' %}"
                   class="flex-1 text-center py-3.5 border border-gray-200 rounded-2xl font-medium text-gray-700 hover:bg-gray-50 transition">
                    Cancel
                </a>
                <button type="submit"
                        class="flex-1 bg-red-600 hover:bg-red-700 text-white py-3.5 rounded-2xl font-medium transition">
                    Save Changes
                </button>
            </div>
        </form>
    </div>
</div>

<script>
document.getElementById('id_image')?.addEventListener('change', function(e) {
    const file = e.target.files[0];
    if (!file) return;
    const preview = document.getElementById('editImagePreview');
    const icon = document.getElementById('editImageIcon');
    preview.src = URL.createObjectURL(file);
    preview.classList.remove('hidden');
    icon.classList.add('hidden');
});
</script>
{% endif %}
