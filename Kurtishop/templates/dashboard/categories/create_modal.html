<!-- Create Modal -->
<div id="createModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
    <div class="bg-white rounded-3xl shadow-xl max-w-lg w-full max-h-[90vh] flex flex-col overflow-hidden">

        <div class="flex justify-between items-center px-8 py-6 border-b border-gray-100 flex-shrink-0">
            <h2 class="text-2xl font-semibold text-gray-900">New Category</h2>
            <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>

        <div class="overflow-y-auto px-8 py-6">
            {% include "dashboard/categories/_category_form.html" with form_action="/dashboard/categories/create/" form_id="create-form" submit_text="Create Category" %}
        </div>

    </div>
</div>
