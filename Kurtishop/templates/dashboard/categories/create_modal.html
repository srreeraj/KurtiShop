<div id="createModal" class="hidden fixed inset-0 bg-black/60 flex items-center justify-center z-50">
    <div class="bg-white rounded-3xl w-full max-w-lg mx-4 shadow-2xl">
        <div class="flex justify-between items-center border-b px-6 py-5">
            <h2 class="text-xl font-semibold">Create New Category</h2>
            <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                <i data-lucide="x" class="w-6 h-6"></i>
            </button>
        </div>
        <form method="post" action="{% url 'categories:category_create' %}" enctype="multipart/form-data" class="p-6 space-y-5">
            {% csrf_token %}
            {% for field in form %}
                <div>
                    <label class="block text-sm font-medium text-gray-700 mb-1.5">{{ field.label }}</label>
                    {{ field }}
                    {% if field.errors %}<p class="text-red-600 text-xs mt-1">{{ field.errors.0 }}</p>{% endif %}
                </div>
            {% endfor %}
            <div class="flex gap-3 pt-4">
                <button type="button" onclick="closeCreateModal()" class="flex-1 py-4 border border-gray-300 rounded-2xl font-medium hover:bg-gray-50 transition">Cancel</button>
                <button type="submit" class="flex-1 bg-red-600 hover:bg-red-700 text-white py-4 rounded-2xl font-medium transition">Create Category</button>
            </div>
        </form>
    </div>
</div>
