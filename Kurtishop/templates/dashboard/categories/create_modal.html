<!-- Create Modal -->
<div id="createModal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-50 flex items-center justify-center">
    <div class="bg-white rounded-3xl shadow-xl max-w-lg w-full mx-4 max-h-[90vh] overflow-hidden">
        <div class="p-8">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-semibold text-gray-900">New Category</h2>
                <button onclick="closeCreateModal()" class="text-gray-400 hover:text-gray-600">
                    <i data-lucide="x" class="w-6 h-6"></i>
                </button>
            </div>
            
            {% include "dashboard/categories/_category_form.html" with form_action="{% url 'categories:category_create' %}" form_id="create-form" submit_text="Create Category" %}
        </div>
    </div>
</div>
