<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Dashboard{% endblock %} - Admin</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    
    <!-- Lucide Icons (recommended) -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Cormorant+Garamond:wght@500;600&display=swap');
        
        .tail-container {
            font-family: 'Inter', system-ui, sans-serif;
        }
        .logo-font {
            font-family: 'Cormorant Garamond', serif;
        }
    </style>
</head>
<body class="tail-container bg-gray-50">
    <div class="flex h-screen overflow-hidden">
        <!-- Sidebar -->
        {% include "dashboard/layout/sidebar.html" %}

        <!-- Main Content -->
        <div class="flex-1 flex flex-col overflow-hidden">
            <!-- Navbar -->
            {% include "dashboard/layout/navbar.html" %}

            <!-- Page Content -->
            <main class="flex-1 overflow-auto p-6 lg:p-8 bg-gray-50">
                {% block content %}
                {% endblock %}
            </main>
        </div>
    </div>

    <script>
        // Initialize Lucide icons
        lucide.createIcons();
        
        // Tailwind script (for dynamic classes if needed)
        tailwind.config = {
            content: [],
            theme: {
                extend: {}
            }
        }
    </script>

    {% block extra_js %}{% endblock %}
</body>
</html>
