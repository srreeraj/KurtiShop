{% extends "dashboard/layout/base.html" %}
{% load static %}

{% block title %}Dashboard{% endblock %}
{% block page_title %}Overview{% endblock %}

{% block content %}
<div class="space-y-8">
    <!-- Stats Cards -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
        <div class="bg-white rounded-3xl p-6 shadow-sm">
            <div class="flex items-center justify-between">
                <div>
                    <p class="text-gray-500 text-sm">Total Revenue</p>
                    <p class="text-3xl font-semibold text-gray-900 mt-1">₹2,45,890</p>
                </div>
                <div class="w-12 h-12 bg-green-100 rounded-2xl flex items-center justify-center text-green-600">
                    <i data-lucide="trending-up" class="w-6 h-6"></i>
                </div>
            </div>
        </div>
        
        <!-- Add more stat cards similarly -->
    </div>

    <div class="grid grid-cols-1 lg:grid-cols-3 gap-6">
        <!-- Recent Orders -->
        <div class="lg:col-span-2 bg-white rounded-3xl p-6">
            <h2 class="text-lg font-semibold mb-4">Recent Orders</h2>
            <!-- Table will go here later -->
        </div>

        <!-- Quick Stats -->
        <div class="bg-white rounded-3xl p-6">
            <h2 class="text-lg font-semibold mb-4">Quick Stats</h2>
        </div>
    </div>
</div>
{% endblock %}
