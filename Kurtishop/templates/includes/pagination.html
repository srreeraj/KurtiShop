<!-- includes/pagination.html -->
{% if page_obj.has_other_pages %}
<nav class="flex justify-center mt-16">
    <div class="flex items-center gap-2">
        {% if page_obj.has_previous %}
            <a href="?page={{ page_obj.previous_page_number }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}"
               class="w-11 h-11 flex items-center justify-center border border-gray-200 rounded-2xl hover:border-red-300 transition-colors">
                ←
            </a>
        {% endif %}

        {% for num in page_obj.paginator.page_range %}
            {% if num >= page_obj.number|add:"-2" and num <= page_obj.number|add:"2" %}
                <a href="?page={{ num }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}"
                   class="w-11 h-11 flex items-center justify-center rounded-2xl font-medium transition-all
                          {% if num == page_obj.number %}bg-red-600 text-white{% else %}border border-gray-200 hover:border-red-300{% endif %}">
                    {{ num }}
                </a>
            {% endif %}
        {% endfor %}

        {% if page_obj.has_next %}
            <a href="?page={{ page_obj.next_page_number }}{% if request.GET.category %}&category={{ request.GET.category }}{% endif %}"
               class="w-11 h-11 flex items-center justify-center border border-gray-200 rounded-2xl hover:border-red-300 transition-colors">
                →
            </a>
        {% endif %}
    </div>
</nav>
{% endif %}
