<!-- includes/category_card.html -->
<a href="{% url 'product_list' %}?category={{ category.slug }}" 
   class="group text-center block">
    
    <div class="relative mx-auto w-28 h-28 md:w-32 md:h-32 rounded-full overflow-hidden border-4 border-gray-100 group-hover:border-red-500 transition-all duration-500 shadow-sm group-hover:shadow-xl">
        
        {% if category.image %}
            <img src="{{ category.image.url }}" 
                 alt="{{ category.name }}"
                 class="w-full h-full object-cover transition-transform duration-700 group-hover:scale-110">
        {% else %}
            <div class="w-full h-full bg-gradient-to-br from-red-100 to-pink-100 flex items-center justify-center">
                <span class="text-5xl opacity-70">👗</span>
            </div>
        {% endif %}

        <!-- Subtle Overlay on Hover -->
        <div class="absolute inset-0 bg-black/0 group-hover:bg-black/10 transition-all duration-300 rounded-full"></div>
    </div>

    <div class="mt-5">
        <p class="text-base font-semibold text-gray-800 group-hover:text-red-600 transition-colors duration-200">
            {{ category.name }}
        </p>
        {% if category.products.count %}
        <p class="text-xs text-gray-500 mt-1">
            {{ category.products.count }} Products
        </p>
        {% endif %}
    </div>

</a>
