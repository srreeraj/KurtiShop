<!-- includes/filter_sidebar.html -->
<div class="bg-white rounded-3xl shadow-sm p-6 sticky top-8">
    <h3 class="font-bold text-xl mb-6">Filters</h3>

    <!-- Categories -->
    <div class="mb-8">
        <h4 class="font-semibold mb-4">Categories</h4>
        <ul class="space-y-3">
            {% for category in categories %}
            <li>
                <a href="{% url 'product_list' %}?category={{ category.slug }}" 
                   class="flex justify-between items-center py-2 px-4 rounded-2xl hover:bg-red-50 transition-all
                          {% if request.GET.category == category.slug %}bg-red-50 text-red-600{% endif %}">
                    <span>{{ category.name }}</span>
                    <span class="text-xs bg-gray-100 px-3 py-1 rounded-full">{{ category.products.count }}</span>
                </a>
            </li>
            {% endfor %}
        </ul>
    </div>

    <!-- Price Range -->
    <div class="mb-8">
        <h4 class="font-semibold mb-4">Price Range</h4>
        <input type="range" min="0" max="5000" class="w-full accent-red-600">
        <div class="flex justify-between text-sm text-gray-500 mt-2">
            <span>₹0</span>
            <span>₹5000+</span>
        </div>
    </div>

    <a href="{% url 'product_list' %}" 
       class="block text-center py-4 border border-red-200 text-red-600 rounded-2xl hover:bg-red-50 font-medium">
        Clear All Filters
    </a>
</div>
