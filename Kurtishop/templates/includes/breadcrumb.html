<!-- includes/breadcrumb.html -->
<nav class="py-6 border-b bg-white">
    <div class="max-w-7xl mx-auto px-5">
        <div class="flex items-center text-sm">
            <a href="{% url 'home' %}" class="hover:text-red-600 transition-colors">Home</a>
            
            {% for crumb in breadcrumbs %}
                <span class="mx-3 text-gray-400">›</span>
                {% if forloop.last %}
                    <span class="text-gray-900 font-medium">{{ crumb.name }}</span>
                {% else %}
                    <a href="{{ crumb.url }}" class="hover:text-red-600 transition-colors">{{ crumb.name }}</a>
                {% endif %}
            {% endfor %}
        </div>
    </div>
</nav>
