<div>
    <div class="flex items-center justify-between mb-6 sm:mb-8">
        <div>
            <h2 class="text-lg sm:text-2xl font-bold text-gray-900">New Arrivals</h2>
            <p class="text-gray-500 text-xs sm:text-sm mt-0.5">Fresh styles, just landed</p>
        </div>
        <a href="{% url 'product_list' %}" class="text-red-600 text-xs sm:text-sm font-semibold hover:underline">View All</a>
    </div>

    <div class="grid grid-cols-2 gap-3 sm:gap-4">
        {% for product in new_arrivals %}
            {% include 'includes/product_card.html' with product=product %}
        {% empty %}
            <p class="text-gray-400 col-span-2 text-sm">No new arrivals found.</p>
        {% endfor %}
    </div>
</div>
